services:
  canton-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: canton-mcp-server
    ports:
      - "7284:7284"
    env_file:
      - path: .env.canton
        required: false
    volumes:
      # Mount canonical DAML documentation repositories (read-only)
      - /opt/canonical-daml-docs-daml:/opt/canonical-daml-docs/daml:ro
      - /opt/canonical-daml-docs-canton:/opt/canonical-daml-docs/canton:ro
      - /opt/canonical-daml-docs-daml-finance:/opt/canonical-daml-docs/daml-finance:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Tell the app to use system env vars (Docker injects from env_file)
      - IS_ISOLATED_ENVIRONMENT=true
      # Canonical DAML documentation path
      - CANONICAL_DOCS_PATH=/opt/canonical-daml-docs
      # Use pre-built ChromaDB index from Docker image
      - CHROMA_PERSIST_DIR=/app/chroma_db
      # Limit ONNX runtime thread pools (avoids over-allocation on shared hosts)
      - OMP_NUM_THREADS=2
      - TOKENIZERS_PARALLELISM=false
    deploy:
      resources:
        limits:
          memory: 1800M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7284/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  canton-network:
    driver: bridge

